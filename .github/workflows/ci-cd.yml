name: CI/CD

on:
  push:
    branches: ["**"]

env:
  AWS_DEFAULT_REGION: ap-southeast-2
  ARTIFACT_BUCKET: afl-odds-artifacts-${{ secrets.AWS_ACCOUNT_ID }}
  ARTIFACT_KEY: afl-odds/lambda.zip
  CHART_ARTIFACT_KEY: afl-odds/chart-lambda.zip
  TF_VERSION: "~> 1.0"
  PYTHON_VERSION: "3.12"

jobs:
  # ── CI ──────────────────────────────────────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r src/requirements.txt pytest

      - name: Check syntax
        run: python -m py_compile src/handler.py

      - name: Run unit tests
        run: pytest tests/ -v

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Generate Terraform backend config
        run: |
          cat > infrastructure/backend.hcl <<EOF
          bucket  = "afl-odds-artifacts-${{ secrets.AWS_ACCOUNT_ID }}"
          key     = "terraform/dev.tfstate"
          region  = "ap-southeast-2"
          encrypt = true
          EOF

      - name: Terraform init
        run: terraform init -input=false -backend-config=backend.hcl
        working-directory: infrastructure

      - name: Terraform plan
        run: |
          terraform plan -input=false \
            -var-file=tfvars/dev.tfvars \
            -var="artifact_bucket=${{ env.ARTIFACT_BUCKET }}"
        working-directory: infrastructure

  # ── Deploy to dev ────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to dev
    needs: ci
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Build Lambda package
        run: |
          mkdir -p build/package
          pip install -r src/requirements.txt -t build/package/ --quiet
          cp src/handler.py src/parquet_builder.py build/package/
          cd build/package && zip -r ../lambda.zip . -x "*.pyc" -x "*/__pycache__/*" -x "*.dist-info/*"

      - name: Upload artifact to S3
        run: aws s3 cp build/lambda.zip s3://${{ env.ARTIFACT_BUCKET }}/${{ env.ARTIFACT_KEY }}

      - name: Build chart builder package
        run: |
          mkdir -p build/chart/package
          pip install -r src/requirements-chart.txt -t build/chart/package/ --quiet
          cp src/chart_builder.py build/chart/package/
          cd build/chart/package && zip -r ../chart-lambda.zip . -x "*.pyc" -x "*/__pycache__/*" -x "*.dist-info/*"

      - name: Upload chart artifact to S3
        run: aws s3 cp build/chart/chart-lambda.zip s3://${{ env.ARTIFACT_BUCKET }}/${{ env.CHART_ARTIFACT_KEY }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Generate Terraform backend config
        run: |
          cat > infrastructure/backend.hcl <<EOF
          bucket  = "afl-odds-artifacts-${{ secrets.AWS_ACCOUNT_ID }}"
          key     = "terraform/dev.tfstate"
          region  = "ap-southeast-2"
          encrypt = true
          EOF

      - name: Terraform init
        run: terraform init -input=false -backend-config=backend.hcl
        working-directory: infrastructure

      - name: Terraform apply
        run: |
          terraform apply -auto-approve -input=false \
            -var-file=tfvars/dev.tfvars \
            -var="artifact_bucket=${{ env.ARTIFACT_BUCKET }}"
        working-directory: infrastructure

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name sports-odds-scraper-dev \
            --s3-bucket ${{ env.ARTIFACT_BUCKET }} \
            --s3-key ${{ env.ARTIFACT_KEY }} \
            --region ${{ env.AWS_DEFAULT_REGION }}
          aws lambda update-function-code \
            --function-name afl-odds-s3-notifier-dev \
            --s3-bucket ${{ env.ARTIFACT_BUCKET }} \
            --s3-key ${{ env.ARTIFACT_KEY }} \
            --region ${{ env.AWS_DEFAULT_REGION }}
          aws lambda update-function-code \
            --function-name afl-odds-parquet-builder-dev \
            --s3-bucket ${{ env.ARTIFACT_BUCKET }} \
            --s3-key ${{ env.ARTIFACT_KEY }} \
            --region ${{ env.AWS_DEFAULT_REGION }}
          aws lambda update-function-code \
            --function-name afl-odds-chart-builder-dev \
            --s3-bucket ${{ env.ARTIFACT_BUCKET }} \
            --s3-key ${{ env.CHART_ARTIFACT_KEY }} \
            --region ${{ env.AWS_DEFAULT_REGION }}

  # ── Deploy to prod ───────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to prod
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Build Lambda package
        run: |
          mkdir -p build/package
          pip install -r src/requirements.txt -t build/package/ --quiet
          cp src/handler.py src/parquet_builder.py build/package/
          cd build/package && zip -r ../lambda.zip . -x "*.pyc" -x "*/__pycache__/*" -x "*.dist-info/*"

      - name: Upload artifact to S3
        run: aws s3 cp build/lambda.zip s3://${{ env.ARTIFACT_BUCKET }}/${{ env.ARTIFACT_KEY }}

      - name: Build chart builder package
        run: |
          mkdir -p build/chart/package
          pip install -r src/requirements-chart.txt -t build/chart/package/ --quiet
          cp src/chart_builder.py build/chart/package/
          cd build/chart/package && zip -r ../chart-lambda.zip . -x "*.pyc" -x "*/__pycache__/*" -x "*.dist-info/*"

      - name: Upload chart artifact to S3
        run: aws s3 cp build/chart/chart-lambda.zip s3://${{ env.ARTIFACT_BUCKET }}/${{ env.CHART_ARTIFACT_KEY }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Generate Terraform backend config
        run: |
          cat > infrastructure/backend.hcl <<EOF
          bucket  = "afl-odds-artifacts-${{ secrets.AWS_ACCOUNT_ID }}"
          key     = "terraform/prod.tfstate"
          region  = "ap-southeast-2"
          encrypt = true
          EOF

      - name: Terraform init
        run: terraform init -input=false -backend-config=backend.hcl
        working-directory: infrastructure

      - name: Terraform apply
        run: |
          terraform apply -auto-approve -input=false \
            -var-file=tfvars/prod.tfvars \
            -var="artifact_bucket=${{ env.ARTIFACT_BUCKET }}"
        working-directory: infrastructure

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name sports-odds-scraper-prod \
            --s3-bucket ${{ env.ARTIFACT_BUCKET }} \
            --s3-key ${{ env.ARTIFACT_KEY }} \
            --region ${{ env.AWS_DEFAULT_REGION }}
          aws lambda update-function-code \
            --function-name afl-odds-s3-notifier-prod \
            --s3-bucket ${{ env.ARTIFACT_BUCKET }} \
            --s3-key ${{ env.ARTIFACT_KEY }} \
            --region ${{ env.AWS_DEFAULT_REGION }}
          aws lambda update-function-code \
            --function-name afl-odds-parquet-builder-prod \
            --s3-bucket ${{ env.ARTIFACT_BUCKET }} \
            --s3-key ${{ env.ARTIFACT_KEY }} \
            --region ${{ env.AWS_DEFAULT_REGION }}
          aws lambda update-function-code \
            --function-name afl-odds-chart-builder-prod \
            --s3-bucket ${{ env.ARTIFACT_BUCKET }} \
            --s3-key ${{ env.CHART_ARTIFACT_KEY }} \
            --region ${{ env.AWS_DEFAULT_REGION }}
